version: '3.8'

services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    environment:
      - APP_ENV=development
      # 必要に応じてFirebaseやGeminiの環境変数を定義（ローカルでは.env経由が安全）
      - FIREBASE_AUTH_EMULATOR_HOST=localhost:9099 

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend